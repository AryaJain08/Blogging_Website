<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore All Blogs - BlogVerse</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .filter-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 16px;
      border: 2px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: transparent;
    }
    .filter-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
    }
  </style>
</head>
<body>

<div class="navbar">
  <div class="logo">BlogVerse</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="explore.html">Explore All</a>
    <a href="write-blog.html">Write Blog</a>
    <a href="why-blogverse.html">Why Us</a>
    <div id="authNav">
      <a href="login.html">Login</a>
    </div>
  </div>
</div>

<div class="container">
  <h2>Explore All Articles</h2>
  <p style="color:#999;font-size:14px;margin-bottom:20px;">Discover our complete collection of articles across various categories</p>
  
  <div class="filter-buttons">
    <button class="filter-btn active">All Articles</button>
    <button class="filter-btn">Technology</button>
    <button class="filter-btn">Design</button>
    <button class="filter-btn">Lifestyle</button>
    <button class="filter-btn">Self-Improvement</button>
    <button class="filter-btn">Environment</button>
    <button class="filter-btn">Photography</button>
    <button class="filter-btn">Education</button>
    <button class="filter-btn">Finance</button>
  </div>

  <div class="grid" id="exploreGrid"></div>
</div>

<div class="footer">© 2026 BlogVerse | Exploring Ideas, Sharing Stories</div>

<script src="js/main.js"></script>
</body>
</html>
